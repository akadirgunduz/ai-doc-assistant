services:
  # Vektör Veri Tabanı (İlanda istenen Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333" # API Portu
      - "6334:6334" # gRPC Portu (Hızlı veri aktarımı için)
    volumes:
      - ./qdrant_storage:/qdrant/storage

  # Object Storage (İlanda istenen MinIO - S3 alternatifi)
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000" # API Portu (Python ile bağlanacağız)
      - "9001:9001" # Dashboard Portu (Arayüzden bakacağız)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
  # Opsiyonel: Ollama (Lokal LLM çalıştırmak istersen)
